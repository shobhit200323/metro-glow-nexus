<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DMRC Crew Control Portal · Trip Finder</title>
<meta name="description" content="Delhi Metro Crew Control dashboard — launch Red, Pink, Blue, Yellow, Green, and Violet line trip-finder portals.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dmrc-cream-1:#fdf9f0;--dmrc-cream-2:#f5ecd7;--dmrc-ink:#1a1a1a;
  --dmrc-ink-muted:#475569;--dmrc-border:rgba(0,0,0,0.08);--dmrc-card-bg:#ffffff;
  --dmrc-red:#8b0000;--dmrc-red-glow:#dc1414;
  --line-red:#ff2a3a;--line-red-deep:#8a0a14;
  --line-pink:#ff3ea0;--line-pink-deep:#6b0a4a;
  --line-blue:#2e7dff;--line-blue-deep:#0a2a6b;
  --line-yellow:#ffd60a;--line-yellow-deep:#6b5200;
  --line-green:#00e08a;--line-green-deep:#053a23;
  --line-violet:#a259ff;--line-violet-deep:#2a0f55;
}
html,body{
  background:linear-gradient(180deg,var(--dmrc-cream-1),var(--dmrc-cream-2));
  color:var(--dmrc-ink);font-family:"Inter",system-ui,sans-serif;min-height:100vh;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(139,0,0,0.25);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(139,0,0,0.4)}
.dmrc-page{position:relative;overflow-x:hidden}
.dmrc-grain{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(0,0,0,0.05) 1px,transparent 1px),radial-gradient(rgba(0,0,0,0.04) 1px,transparent 1px);
  background-size:3px 3px,7px 7px;opacity:0.5;mix-blend-mode:multiply;
}
.dmrc-ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.dmrc-ambient::before{
  content:"";position:absolute;inset:-20%;
  background-image:linear-gradient(rgba(139,0,0,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(139,0,0,0.07) 1px,transparent 1px);
  background-size:48px 48px,48px 48px;
  mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%);
  animation:gridDrift 28s linear infinite;opacity:0.55;
}
@keyframes gridDrift{0%{transform:translate(0,0)}100%{transform:translate(48px,48px)}}
.dmrc-ambient::after{
  content:"";position:absolute;inset:-10%;
  background:radial-gradient(circle at 18% 22%,rgba(255,170,60,0.22),transparent 38%),
    radial-gradient(circle at 82% 30%,rgba(220,20,60,0.18),transparent 42%),
    radial-gradient(circle at 30% 80%,rgba(46,125,255,0.16),transparent 40%),
    radial-gradient(circle at 75% 78%,rgba(162,89,255,0.16),transparent 42%);
  filter:blur(60px) saturate(140%);mix-blend-mode:multiply;opacity:0.7;
  animation:auroraDrift 22s ease-in-out infinite alternate;
}
@keyframes auroraDrift{0%{transform:translate(-3%,-2%) scale(1)}50%{transform:translate(2%,3%) scale(1.06)}100%{transform:translate(3%,-3%) scale(1.02)}}
.dmrc-scanline{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:linear-gradient(180deg,transparent 0%,rgba(255,200,100,0.06) 48%,rgba(255,200,100,0.12) 50%,rgba(255,200,100,0.06) 52%,transparent 100%);
  background-size:100% 220%;background-repeat:no-repeat;
  animation:scanSweep 11s ease-in-out infinite;mix-blend-mode:screen;opacity:0.6;
}
@keyframes scanSweep{0%{background-position:0% -120%}50%{background-position:0% 120%}100%{background-position:0% -120%}}
@keyframes fadeInPage{from{opacity:0}to{opacity:1}}
.fade-in-page{animation:fadeInPage 600ms ease-out both}
.dmrc-mark{
  display:inline-block;font-weight:900;color:var(--dmrc-red);letter-spacing:0.08em;
  border:1px solid color-mix(in oklab,var(--dmrc-red) 60%,transparent);border-radius:6px;padding:0 6px;
  background:linear-gradient(180deg,rgba(255,255,255,0.6),rgba(255,220,220,0.4));
  box-shadow:0 0 8px rgba(220,20,20,0.55),0 0 18px rgba(255,60,60,0.35),inset 0 0 6px rgba(220,20,20,0.2);
  text-shadow:0 0 6px rgba(255,60,60,0.55);animation:dmrcGlow 2.4s ease-in-out infinite;
}
@keyframes dmrcGlow{0%,100%{box-shadow:0 0 6px rgba(220,20,20,0.45),0 0 14px rgba(255,60,60,0.3),inset 0 0 6px rgba(220,20,20,0.18)}50%{box-shadow:0 0 12px rgba(220,20,20,0.75),0 0 28px rgba(255,60,60,0.55),inset 0 0 10px rgba(220,20,20,0.28)}}
.dmrc-filterbar{
  background:rgba(255,255,255,0.65);border:1px solid rgba(0,0,0,0.06);
  backdrop-filter:blur(16px) saturate(170%);-webkit-backdrop-filter:blur(16px) saturate(170%);
  border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.05),0 1px 3px rgba(0,0,0,0.03);
}
.line-card{
  position:relative;overflow:hidden;border-radius:18px;padding:22px 20px 20px;
  background:var(--dmrc-card-bg);border:1px solid rgba(0,0,0,0.06);border-top:4px solid var(--accent);
  box-shadow:0 12px 30px -18px color-mix(in oklab,var(--accent) 70%,transparent),0 2px 8px rgba(0,0,0,0.04);
  transition:transform 280ms cubic-bezier(.2,.7,.2,1),box-shadow 280ms,border-color 280ms;
  display:flex;flex-direction:column;gap:16px;min-height:250px;isolation:isolate;
}
.line-card::after{
  content:"";position:absolute;inset:-1px;
  background:linear-gradient(120deg,transparent 30%,color-mix(in oklab,var(--accent) 28%,transparent) 50%,transparent 70%);
  opacity:0;transition:opacity 400ms,transform 800ms;transform:translateX(-30%);pointer-events:none;border-radius:inherit;z-index:1;
}
.line-card:hover{transform:translateY(-6px) scale(1.01);box-shadow:0 24px 50px -20px color-mix(in oklab,var(--accent) 80%,transparent),0 8px 24px rgba(0,0,0,0.08),0 0 0 1px color-mix(in oklab,var(--accent) 40%,transparent)}
.line-card:hover::after{opacity:1;transform:translateX(30%)}
.line-card.is-locked{opacity:0.65}
.line-card.is-locked:hover{transform:translateY(-3px)}
.line-card-content{position:relative;z-index:2;display:contents}
.line-card .scanline{
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent,color-mix(in oklab,var(--accent) 14%,transparent),transparent);
  height:30%;pointer-events:none;animation:scanline 6s linear infinite;z-index:1;opacity:0.5;
}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
@keyframes liveDot{0%,100%{opacity:1}50%{opacity:0.35}}
.live-dot{animation:liveDot 1.6s ease-in-out infinite}
/* Splash */
.splash-root{
  position:fixed;inset:0;z-index:100;display:grid;place-items:center;
  background:radial-gradient(ellipse at center,#4fc3f7 0%,#29b6f6 55%,#0288d1 100%);
  cursor:pointer;overflow:hidden;animation:splashFadeIn 700ms ease-out both;
}
.splash-root.is-leaving{animation:splashFadeOut 700ms ease-in forwards}
@keyframes splashFadeIn{from{opacity:0}to{opacity:1}}
@keyframes splashFadeOut{to{opacity:0;transform:scale(1.04)}}
.splash-rays{
  position:absolute;inset:-20%;
  background:radial-gradient(circle at 30% 40%,rgba(0,200,255,0.18),transparent 40%),
    radial-gradient(circle at 70% 60%,rgba(0,102,255,0.14),transparent 45%),
    radial-gradient(circle at 50% 50%,rgba(174,240,255,0.10),transparent 60%);
  filter:blur(40px);animation:raysDrift 18s ease-in-out infinite alternate;pointer-events:none;
}
@keyframes raysDrift{from{transform:translate(-2%,-2%) scale(1)}to{transform:translate(2%,3%) scale(1.08)}}
.splash-gateway{
  position:absolute;top:50%;left:50%;width:min(82vmin,720px);height:min(82vmin,720px);
  transform:translate(-50%,-50%);pointer-events:none;
  opacity:0;animation:gatewayIn 1.8s ease-out 0.2s forwards;
}
@keyframes gatewayIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.6)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(0,200,255,0.25);box-shadow:0 0 60px rgba(0,102,255,0.25) inset,0 0 80px rgba(0,102,255,0.18);pointer-events:none}
.ring-1{
  background:conic-gradient(from 0deg,transparent 0 60%,rgba(0,200,255,0.45) 70%,transparent 80%);
  -webkit-mask:radial-gradient(circle,transparent 48%,black 49%,black 50%,transparent 51%);
  mask:radial-gradient(circle,transparent 48%,black 49%,black 50%,transparent 51%);
  animation:spin 22s linear infinite;
}
.ring-2{
  inset:10%;border-color:rgba(0,102,255,0.35);
  background:conic-gradient(from 180deg,transparent 0 50%,rgba(0,200,255,0.55) 65%,transparent 78%);
  -webkit-mask:radial-gradient(circle,transparent 47%,black 48%,black 51%,transparent 52%);
  mask:radial-gradient(circle,transparent 47%,black 48%,black 51%,transparent 52%);
  animation:spin 14s linear infinite reverse;
}
.ring-3{
  inset:22%;border-color:rgba(174,240,255,0.4);
  background:conic-gradient(from 90deg,transparent 0 55%,rgba(174,240,255,0.6) 70%,transparent 82%);
  -webkit-mask:radial-gradient(circle,transparent 44%,black 45%,black 52%,transparent 53%);
  mask:radial-gradient(circle,transparent 44%,black 45%,black 52%,transparent 53%);
  animation:spin 9s linear infinite;
}
.ring-4{inset:34%;border-color:rgba(220,245,255,0.5);box-shadow:0 0 30px rgba(0,200,255,0.55) inset,0 0 50px rgba(0,102,255,0.5);animation:ringBreathe 4s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ringBreathe{0%,100%{opacity:0.7;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
.ring-pulse{position:absolute;inset:34%;border-radius:50%;border:2px solid rgba(0,200,255,0.6);animation:ringPulse 3.4s ease-out infinite;pointer-events:none}
.ring-pulse.delay-2{animation-delay:1.7s}
@keyframes ringPulse{0%{transform:scale(0.8);opacity:0.9}100%{transform:scale(2.2);opacity:0}}
.splash-particles{position:absolute;inset:0;pointer-events:none}
.spark{position:absolute;border-radius:50%;background:radial-gradient(circle,#aef0ff 0%,rgba(0,200,255,0.6) 50%,transparent 80%);box-shadow:0 0 6px rgba(0,200,255,0.8);opacity:0;animation:sparkDrift 6s ease-in-out infinite;pointer-events:none}
@keyframes sparkDrift{0%{opacity:0;transform:translateY(10px) scale(0.6)}20%{opacity:1}80%{opacity:1}100%{opacity:0;transform:translateY(-30px) scale(1.1)}}
.splash-stack{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;gap:28px;text-align:center;padding:0 24px;pointer-events:none}
.splash-logo-wrap{position:relative;width:clamp(150px,26vmin,240px);height:clamp(150px,26vmin,240px);opacity:0;animation:logoIn 1.4s ease-out 0.3s forwards;filter:drop-shadow(0 0 40px rgba(0,200,255,0.7))}
.splash-logo{width:100%;height:100%;object-fit:contain;border-radius:20px}
@keyframes logoIn{from{opacity:0;transform:scale(0.8);filter:drop-shadow(0 0 0 rgba(0,200,255,0))}to{opacity:1;transform:scale(1);filter:drop-shadow(0 0 40px rgba(0,200,255,0.7))}}
.splash-sheen{position:absolute;inset:0;border-radius:20px;background:linear-gradient(110deg,transparent 35%,rgba(220,240,255,0.55) 50%,transparent 65%);mix-blend-mode:screen;animation:sheenSweep 4s ease-in-out 1.2s infinite;pointer-events:none;-webkit-mask:radial-gradient(circle,black 60%,transparent 70%);mask:radial-gradient(circle,black 60%,transparent 70%)}
@keyframes sheenSweep{0%{transform:translateX(-120%);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translateX(120%);opacity:0}}
.splash-title{font-family:"Inter",system-ui,sans-serif;font-size:clamp(36px,6vmin,64px);font-weight:900;letter-spacing:0.1em;color:#0d1b2a;text-shadow:0 0 30px rgba(255,255,255,0.6),0 0 60px rgba(255,255,255,0.3),0 4px 20px rgba(0,0,0,0.08);opacity:0;animation:titleIn 1s ease-out 0.8s forwards}
@keyframes titleIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.splash-hint{position:absolute;bottom:6vh;left:50%;transform:translateX(-50%);z-index:5;font-size:11px;letter-spacing:0.4em;text-transform:uppercase;color:rgba(13,27,42,0.65);text-shadow:0 0 8px rgba(255,255,255,0.4);animation:hintPulse 2s ease-in-out infinite;pointer-events:none}
@keyframes hintPulse{0%,100%{opacity:0.5}50%{opacity:1}}
.splash-skip{position:absolute;top:20px;right:20px;z-index:10;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;padding:6px 14px;border-radius:999px;border:1px solid rgba(13,27,42,0.3);background:rgba(255,255,255,0.85);color:#0d1b2a;backdrop-filter:blur(8px);cursor:pointer;transition:background 200ms,border-color 200ms,color 200ms;opacity:0;animation:skipIn 0.6s ease-out 2s forwards}
.splash-skip:hover{background:#ffffff;border-color:#0d1b2a;color:#0d1b2a}
@keyframes skipIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
/* Side panels */
.dmrc-side{position:fixed;top:0;bottom:0;width:clamp(120px,14vw,220px);z-index:1;pointer-events:none;display:none;background-size:cover;background-position:center;background-repeat:no-repeat;filter:saturate(0.85) brightness(1.05) contrast(1.02);opacity:0.9}
.dmrc-side-left{left:0;background-image:url('side-panel.jpeg');mask-image:linear-gradient(90deg,black 0%,black 55%,transparent 100%);-webkit-mask-image:linear-gradient(90deg,black 0%,black 55%,transparent 100%)}
.dmrc-side-right{right:0;background-image:url('side-panel.jpeg');transform:scaleX(-1);mask-image:linear-gradient(90deg,black 0%,black 55%,transparent 100%);-webkit-mask-image:linear-gradient(90deg,black 0%,black 55%,transparent 100%)}
@media(min-width:1100px){.dmrc-side{display:block}}
/* Watermark */
.watermark-image{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0.08;background:url('lines/dmrc-girl.jpg') center/contain no-repeat}
@media(prefers-reduced-motion:reduce){.splash-root *,.line-card .scanline,.dmrc-mark{animation:none!important}.line-card:hover{transform:none}}
</style>
</head>
<body>
<div id="splash" class="splash-root">
  <div class="splash-rays"></div>
  <div class="splash-gateway">
    <div class="ring ring-1"></div><div class="ring ring-2"></div>
    <div class="ring ring-3"></div><div class="ring ring-4"></div>
    <div class="ring-pulse"></div><div class="ring-pulse delay-2"></div>
  </div>
  <div class="splash-particles" id="particles"></div>
  <div class="splash-stack">
    <div class="splash-logo-wrap">
      <img src="dmrc-logo.png" alt="DMRC" class="splash-logo">
      <span class="splash-sheen"></span>
    </div>
    <h1 class="splash-title">Welcome to <span class="dmrc-mark">DMRC</span> Trip Finder</h1>
  </div>
  <div class="splash-hint" id="splashHint">Click anywhere to enter</div>
  <button class="splash-skip" onclick="dismissSplash()">Skip</button>
</div>

<div id="dashboard" class="fade-in-page relative min-h-screen dmrc-page" style="display:none">
  <div class="dmrc-grain"></div>
  <div class="dmrc-ambient"></div>
  <div class="dmrc-scanline"></div>
  <div class="watermark-image" aria-hidden></div>
  <aside class="dmrc-side dmrc-side-left"></aside>
  <aside class="dmrc-side dmrc-side-right"></aside>
  <div class="relative" style="z-index:10;max-width:1200px;margin:0 auto;padding:2rem 1.25rem">
    <header style="position:relative;margin-bottom:2rem;display:flex;flex-direction:column;align-items:center;gap:8px">
      <img src="dmrc-logo.png" alt="DMRC" style="width:52px;height:52px;object-fit:contain;border-radius:8px">
      <div style="text-align:center">
        <h1 style="font-family:'JetBrains Mono',monospace;font-size:1.25rem;font-weight:700;letter-spacing:0.25em;color:oklch(0.129 0.042 264.695)">
          <span class="dmrc-mark">DMRC</span> <span style="color:oklch(0.608 0.126 61.74)">CREW CONTROL</span>
        </h1>
        <p id="lineCount" style="margin-top:4px;font-size:11px;text-transform:uppercase;letter-spacing:0.3em;color:oklch(0.554 0.046 257.417)"></p>
      </div>
      <div id="clock" style="position:absolute;right:0;top:50%;transform:translateY(-50%);border-radius:8px;border:1px solid rgba(0,0,0,0.06);background:rgba(255,255,255,0.6);padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.04em;color:oklch(0.129 0.042 264.695);box-shadow:0 2px 8px rgba(0,0,0,0.04);backdrop-filter:blur(8px)">
        <span id="clockTime">--:--:--</span> <span style="margin-left:4px;font-size:10px;color:oklch(0.554 0.046 257.417);font-weight:500">IST</span>
      </div>
    </header>

    <div id="filterBar" class="dmrc-filterbar" style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;margin-bottom:1.5rem">
      <div id="filterButtons" style="display:flex;flex-wrap:wrap;gap:6px"></div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.25em;color:oklch(0.554 0.046 257.417)">
        Press <kbd style="display:inline-block;border-radius:4px;border:1px solid rgba(0,0,0,0.08);background:#fff;padding:2px 6px;font-family:'JetBrains Mono',monospace;color:oklch(0.208 0.042 265.755);box-shadow:0 1px 2px rgba(0,0,0,0.04)">1–6</kbd> to launch
      </div>
    </div>

    <div id="cardGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1.25rem"></div>

    <footer style="margin-top:3rem;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;border-top:1px solid rgba(0,0,0,0.06);padding-top:1.5rem;font-size:10px;text-transform:uppercase;letter-spacing:0.3em;color:oklch(0.554 0.046 257.417)">
      <div><span class="dmrc-mark">DMRC</span> Crew Control Portal</div>
      <div id="legendDots" style="display:flex;gap:8px"></div>
    </footer>
    <div style="text-align:center;padding:20px 10px 5px;font-size:11px;color:rgba(0,0,0,0.45);border-top:1px solid rgba(0,0,0,0.06);margin-top:30px;line-height:1.6;font-family:'Rajdhani',sans-serif;">
      <div style="font-weight:600;letter-spacing:1px;">Conceived to Constructed by</div>
      <div style="font-weight:500;letter-spacing:0.5px;">Mohit (3623) / Shobhit (18811)</div>
    </div>
  </div>
</div>

<script>
const LINES = [
  {id:"red",name:"RED LINE",short:"L1",desc:"Shadara Crew Control",stations:"21 Stations · 34.6 km",accent:"var(--line-red)",accentDeep:"var(--line-red-deep)",url:"/lines/redline.html",active:true,key:"1",persona:"Holographic / Web-Slinger"},
  {id:"pink",name:"PINK LINE",short:"L7",desc:"KKDA & PBGW Crew Control",stations:"25 Stations · 38.5 km",accent:"var(--line-pink)",accentDeep:"var(--line-pink-deep)",url:"/lines/pinkline.html",active:true,key:"2",persona:"Blade Runner 2049"},
  {id:"blue",name:"BLUE LINE",short:"L3/4",desc:"Dwarka & YB Crew Control",stations:"34 Stations · 49.3 km",accent:"var(--line-blue)",accentDeep:"var(--line-blue-deep)",url:"/lines/blueline.html",active:true,key:"3",persona:"Government-Grade Sentinel"},
  {id:"yellow",name:"YELLOW LINE",short:"L2",desc:"Tron Grid",stations:"Coming Soon",accent:"var(--line-yellow)",accentDeep:"var(--line-yellow-deep)",url:"",active:false,key:"4",persona:"Tron Legacy"},
  {id:"green",name:"GREEN LINE",short:"L5",desc:"Bio Matrix",stations:"Coming Soon",accent:"var(--line-green)",accentDeep:"var(--line-green-deep)",url:"",active:false,key:"5",persona:"Matrix / Bio Lattice"},
  {id:"violet",name:"VIOLET LINE",short:"L6",desc:"Synthwave",stations:"Coming Soon",accent:"var(--line-violet)",accentDeep:"var(--line-violet-deep)",url:"",active:false,key:"6",persona:"Synthwave Horizon"}
];

const ORDER_KEY = "dmrc-line-order";
const FILTER_KEY = "dmrc-filter";

let currentFilter = "all";
let currentOrder = [];

function loadOrder() {
  try {
    const raw = localStorage.getItem(ORDER_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      const valid = saved.filter(id => LINES.some(l => l.id === id));
      const missing = LINES.map(l => l.id).filter(id => !valid.includes(id));
      currentOrder = [...valid, ...missing];
    } else {
      currentOrder = LINES.map(l => l.id);
    }
  } catch { currentOrder = LINES.map(l => l.id); }
}
loadOrder();

function saveOrder() {
  try { localStorage.setItem(ORDER_KEY, JSON.stringify(currentOrder)); } catch {}
}

function loadFilter() {
  try {
    const saved = sessionStorage.getItem(FILTER_KEY);
    if (saved) currentFilter = saved;
  } catch {}
}
loadFilter();

function saveFilter() {
  try { sessionStorage.setItem(FILTER_KEY, currentFilter); } catch {}
}

function getOrderedLines() {
  const byId = {};
  LINES.forEach(l => byId[l.id] = l);
  return currentOrder.map(id => byId[id]).filter(Boolean);
}

function getFilteredLines() {
  return getOrderedLines().filter(l =>
    currentFilter === "all" ? true : currentFilter === "active" ? l.active : !l.active
  );
}

function formatRelative(ms) {
  const diff = Date.now() - ms;
  const s = Math.floor(diff / 1000);
  if (s < 60) return "just now";
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  return `${d}d ago`;
}

function getLastSeen(id) {
  try { const raw = localStorage.getItem(`dmrc-last-${id}`); if (raw) return formatRelative(parseInt(raw)); } catch {}
  return null;
}

function updateClock() {
  const now = new Date();
  const t = now.toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata", hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
  document.getElementById("clockTime").textContent = t;
}

function renderDashboard() {
  const filtered = getFilteredLines();
  const allCount = LINES.length;
  const activeCount = LINES.filter(l => l.active).length;
  const soonCount = LINES.filter(l => !l.active).length;

  document.getElementById("lineCount").textContent = `Trip Finder Portal · ${activeCount} of ${allCount} lines online`;

  const fb = document.getElementById("filterButtons");
  fb.innerHTML = "";
  [
    ["all", `All · ${allCount}`],
    ["active", `Active · ${activeCount}`],
    ["soon", `Coming Soon · ${soonCount}`]
  ].forEach(([f, label]) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = label;
    const isActive = currentFilter === f;
    Object.assign(btn.style, {
      borderRadius: "6px", padding: "6px 14px", fontSize: "11px", fontWeight: "600",
      textTransform: "uppercase", letterSpacing: "0.05em", border: "none", cursor: "pointer",
      transition: "all 200ms",
      background: isActive ? "var(--dmrc-ink)" : "transparent",
      color: isActive ? "#fef3c7" : "oklch(0.554 0.046 257.417)"
    });
    if (!isActive) {
      btn.onmouseenter = () => { btn.style.background = "rgba(0,0,0,0.05)"; btn.style.color = "var(--dmrc-ink)"; };
      btn.onmouseleave = () => { btn.style.background = "transparent"; btn.style.color = "oklch(0.554 0.046 257.417)"; };
    }
    btn.onclick = () => {
      currentFilter = f; saveFilter(); renderDashboard();
    };
    fb.appendChild(btn);
  });

  const grid = document.getElementById("cardGrid");
  grid.innerHTML = "";
  filtered.forEach((line, i) => {
    const card = document.createElement("div");
    card.className = `line-card ${line.active ? "" : "is-locked"}`;
    card.style.setProperty("--accent", line.accent);
    card.style.setProperty("--accent-deep", line.accentDeep);
    card.draggable = true;
    card.dataset.lineId = line.id;

    const lastSeen = getLastSeen(line.id);

    card.innerHTML = `
      ${line.active ? '<div class="scanline"></div>' : ''}
      <div class="line-card-content">
        <div style="display:flex;justify-content:center;position:relative;z-index:10">
          <img src="dmrc-logo.png" alt="DMRC" style="width:44px;height:44px;object-fit:contain;border-radius:6px">
        </div>
        <div style="display:flex;align-items:flex-start;justify-content:space-between;position:relative;z-index:10">
          <span style="border-radius:6px;border:1px solid color-mix(in oklab,${line.accent} 55%,transparent);background:color-mix(in oklab,${line.accent} 12%,transparent);color:${line.accentDeep};padding:2px 10px;font-size:10px;font-weight:700;letter-spacing:0.05em">${line.short}</span>
          <div style="display:flex;align-items:center;gap:8px">
            ${line.active
              ? '<span style="display:inline-flex;align-items:center;gap:6px;border-radius:999px;border:1px solid rgba(5,150,105,0.5);background:rgba(5,150,105,0.1);padding:4px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#065f46"><span class="live-dot" style="width:6px;height:6px;border-radius:50%;background:#10b981"></span>Live</span>'
              : '<span style="display:inline-flex;align-items:center;gap:6px;border-radius:999px;border:1px solid oklch(0.929 0.013 255.508);background:oklch(0.968 0.007 247.896);padding:4px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:oklch(0.554 0.046 257.417)">Coming Soon</span>'
            }
            <span class="drag-handle" style="border-radius:6px;padding:4px;color:oklch(0.554 0.046 257.417);cursor:grab;display:inline-flex;font-size:18px;line-height:1;user-select:none" title="Drag to reorder">⠿</span>
          </div>
        </div>
        <div style="position:relative;z-index:10;text-align:center">
          <h3 style="font-family:'JetBrains Mono',monospace;font-size:1.25rem;font-weight:700;letter-spacing:0.05em;color:${line.accentDeep}">${line.name}</h3>
          <p style="margin-top:4px;font-size:14px;color:oklch(0.554 0.046 257.417)"><span class="dmrc-mark">DMRC</span> · ${line.desc}</p>
        </div>
        <div style="position:relative;z-index:10;margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:8px">
          <span style="font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:oklch(0.554 0.046 257.417)">${lastSeen ? `Last opened ${lastSeen}` : `Shortcut · ${line.key}`}</span>
          ${line.active
            ? `<button type="button" class="launch-btn" data-line-id="${line.id}" style="display:inline-flex;align-items:center;gap:8px;border-radius:8px;border:1px solid color-mix(in oklab,${line.accent} 70%,transparent);background:${line.accent};color:#fff;padding:9px 14px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;border:none;transition:opacity 200ms,transform 200ms">Launch Portal →</button>`
            : '<span style="font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:oklch(0.704 0.04 256.788)">Locked</span>'
          }
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  document.querySelectorAll(".launch-btn").forEach(btn => {
    btn.addEventListener("click", function() {
      const lid = this.dataset.lineId;
      const line = LINES.find(l => l.id === lid);
      if (!line || !line.url) return;
      this.disabled = true;
      this.textContent = "Launching…";
      this.style.opacity = "0.7";
      try { localStorage.setItem(`dmrc-last-${lid}`, Date.now().toString()); } catch {}
      setTimeout(() => {
        window.open(line.url, "_blank", "noopener,noreferrer");
        this.disabled = false;
        this.textContent = "Launch Portal →";
        this.style.opacity = "1";
        renderDashboard();
      }, 250);
    });
  });

  const legend = document.getElementById("legendDots");
  legend.innerHTML = "";
  LINES.forEach(l => {
    const dot = document.createElement("span");
    dot.title = l.name;
    Object.assign(dot.style, {
      width: "8px", height: "8px", borderRadius: "50%",
      background: l.accent, opacity: l.active ? 1 : 0.35, display: "inline-block"
    });
    legend.appendChild(dot);
  });
}

let dragSrcId = null;
document.addEventListener("dragstart", function(e) {
  const card = e.target.closest(".line-card");
  if (!card) return;
  const handle = e.target.closest(".drag-handle");
  if (!handle) { e.preventDefault(); return; }
  dragSrcId = card.dataset.lineId;
  card.style.opacity = "0.5";
});
document.addEventListener("dragend", function(e) {
  const card = e.target.closest(".line-card");
  if (card) card.style.opacity = "";
});
document.addEventListener("dragover", function(e) {
  e.preventDefault();
  const card = e.target.closest(".line-card");
  if (!card) return;
  card.style.transform = "translateY(-3px)";
});
document.addEventListener("dragleave", function(e) {
  const card = e.target.closest(".line-card");
  if (card) card.style.transform = "";
});
document.addEventListener("drop", function(e) {
  e.preventDefault();
  const card = e.target.closest(".line-card");
  if (!card || !dragSrcId) return;
  card.style.transform = "";
  const targetId = card.dataset.lineId;
  if (dragSrcId === targetId) return;
  const oldIdx = currentOrder.indexOf(dragSrcId);
  const newIdx = currentOrder.indexOf(targetId);
  if (oldIdx < 0 || newIdx < 0) return;
  currentOrder.splice(oldIdx, 1);
  currentOrder.splice(newIdx, 0, dragSrcId);
  saveOrder();
  renderDashboard();
});

document.addEventListener("keydown", function(e) {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.isContentEditable) return;
  const idx = parseInt(e.key) - 1;
  if (idx >= 0 && idx < 10) {
    const filtered = getFilteredLines();
    const line = filtered[idx];
    if (line && line.active && line.url) {
      window.open(line.url, "_blank", "noopener,noreferrer");
    }
  }
});

function dismissSplash() {
  const splash = document.getElementById("splash");
  if (splash.classList.contains("is-leaving")) return;
  splash.classList.add("is-leaving");
  setTimeout(() => {
    splash.style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  }, 700);
}

document.addEventListener("DOMContentLoaded", function() {
  const container = document.getElementById("particles");
  for (let i = 0; i < 70; i++) {
    const span = document.createElement("span");
    span.className = "spark";
    span.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*3}px;height:${1+Math.random()*3}px;animation-delay:${Math.random()*6}s;animation-duration:${5+Math.random()*7}s`;
    container.appendChild(span);
  }

  const splash = document.getElementById("splash");
  splash.addEventListener("click", dismissSplash);
  splash.addEventListener("keydown", function(e) { if (e.key === "Escape" || e.key === "Enter" || e.key === " ") { e.preventDefault(); dismissSplash(); } });

  setTimeout(() => { document.getElementById("splashHint").style.display = "block"; }, 3000);
  setTimeout(() => { if (!splash.classList.contains("is-leaving")) dismissSplash(); }, 8000);

  updateClock();
  setInterval(updateClock, 1000);

  renderDashboard();
});
</script>
</body>
</html>
